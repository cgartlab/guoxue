<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记和书签 - 国学课堂</title>
  <link rel="stylesheet" href="/assets/css/ds-design-system.css">
  <style>
    /* ===== 布局 ===== */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--ds-space-6);
    }

    /* ===== 头部 ===== */
    .page-header {
      margin-bottom: var(--ds-space-6);
    }

    .page-title {
      font-family: var(--ds-font-display);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--ds-color-fg-strong);
      margin-bottom: var(--ds-space-2);
    }

    .page-subtitle {
      font-size: 0.875rem;
      color: var(--ds-color-muted);
    }

    /* ===== 选项卡 ===== */
    .tabs {
      display: flex;
      gap: var(--ds-space-2);
      margin-bottom: var(--ds-space-6);
      border-bottom: 2px solid var(--ds-color-border);
    }

    .tab {
      padding: var(--ds-space-3) var(--ds-space-4);
      border: none;
      background: none;
      color: var(--ds-color-muted);
      font-family: var(--ds-font-body);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all var(--ds-duration-200) var(--ds-ease-out);
    }

    .tab:hover {
      color: var(--ds-color-fg);
    }

    .tab.active {
      color: var(--ds-accent);
      border-bottom-color: var(--ds-accent);
      font-weight: 600;
    }

    /* ===== 课程选择器 ===== */
    .course-selector {
      margin-bottom: var(--ds-space-5);
      display: flex;
      gap: var(--ds-space-3);
      align-items: center;
      flex-wrap: wrap;
    }

    .course-selector label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ds-color-muted);
    }

    .course-selector select {
      padding: var(--ds-space-2) var(--ds-space-3);
      border: 1px solid var(--ds-color-border);
      border-radius: var(--ds-radius-md);
      font-family: var(--ds-font-body);
      font-size: 0.8125rem;
      color: var(--ds-color-fg);
      cursor: pointer;
      min-width: 200px;
      background: var(--ds-color-surface);
    }

    /* ===== 笔记卡片 ===== */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--ds-space-5);
    }

    .note-card {
      background: var(--ds-color-surface);
      border-radius: var(--ds-radius-xl);
      box-shadow: var(--ds-shadow-sm);
      overflow: hidden;
      border-left: 4px solid;
      transition: all var(--ds-duration-200) var(--ds-ease-out);
      border: 1px solid var(--ds-color-border);
      border-left-width: 4px;
    }

    .note-card:hover {
      box-shadow: var(--ds-shadow-md);
      transform: translateY(-2px);
    }

    /* P1: 笔记颜色标签使用设计系统 token（含暗色模式覆盖），见 ds-design-system.css */
    .note-card.yellow { border-left-color: var(--ds-color-note-yellow); }
    .note-card.green  { border-left-color: var(--ds-color-note-green);  }
    .note-card.blue   { border-left-color: var(--ds-color-note-blue);   }
    .note-card.pink   { border-left-color: var(--ds-color-note-pink);   }
    .note-card.red    { border-left-color: var(--ds-color-note-red);    }

    .note-header {
      padding: var(--ds-space-4);
      border-bottom: 1px solid var(--ds-color-border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .note-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ds-color-fg-strong);
      margin-bottom: var(--ds-space-1);
      flex: 1;
      word-break: break-word;
    }

    .note-meta {
      font-size: 0.6875rem;
      color: var(--ds-color-muted);
    }

    .note-actions {
      display: flex;
      gap: var(--ds-space-1);
    }

    .note-action-btn {
      background: none;
      border: none;
      color: var(--ds-color-muted);
      cursor: pointer;
      font-size: 1rem;
      transition: color var(--ds-duration-150) var(--ds-ease-out);
    }

    .note-action-btn:hover {
      color: var(--ds-accent);
    }

    .note-body {
      padding: var(--ds-space-4);
      font-size: 0.8125rem;
      line-height: 1.6;
      color: var(--ds-color-fg);
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ===== 书签列表 ===== */
    .bookmarks-list {
      background: var(--ds-color-surface);
      border-radius: var(--ds-radius-xl);
      box-shadow: var(--ds-shadow-sm);
      overflow: hidden;
      border: 1px solid var(--ds-color-border);
    }

    .bookmark-item {
      padding: var(--ds-space-4);
      border-bottom: 1px solid var(--ds-color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bookmark-item:last-child {
      border-bottom: none;
    }

    .bookmark-info {
      flex: 1;
    }

    .bookmark-course {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ds-color-fg-strong);
      margin-bottom: var(--ds-space-1);
    }

    .bookmark-page {
      font-size: 0.75rem;
      color: var(--ds-color-muted);
    }

    .bookmark-actions {
      display: flex;
      gap: var(--ds-space-2);
      align-items: center;
    }

    .bookmark-icon {
      font-size: 1.125rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--ds-color-error);
      cursor: pointer;
      font-size: 1rem;
      transition: opacity var(--ds-duration-150) var(--ds-ease-out);
    }

    .delete-btn:hover {
      opacity: 0.7;
    }

    /* ===== 空状态 ===== */
    .empty-state {
      text-align: center;
      padding: var(--ds-space-16) var(--ds-space-5);
      color: var(--ds-color-muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: var(--ds-space-4);
    }

    .empty-text {
      font-size: 1rem;
      color: var(--ds-color-fg);
      margin-bottom: var(--ds-space-2);
    }

    .empty-hint {
      font-size: 0.8125rem;
      color: var(--ds-color-muted);
    }

    /* ===== 加载状态 ===== */
    .loading {
      text-align: center;
      padding: var(--ds-space-10) var(--ds-space-5);
      color: var(--ds-color-muted);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .notes-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 1.5rem;
      }

      .course-selector {
        flex-direction: column;
        align-items: stretch;
      }

      .course-selector select {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="ds-navbar" aria-label="主导航">
    <div class="ds-navbar__inner">
      <a class="ds-btn-nav ds-btn-nav--brand" href="/">国学课堂</a>
      <span class="flex-spacer"></span>
      <a class="ds-btn-nav" href="/">首页</a>
      <a class="ds-btn-nav ds-btn-nav--ghost" href="/dashboard.html">学习面板</a>
      <a class="ds-btn-nav ds-btn-nav--ghost active" href="/notes.html" aria-current="page">笔记和书签</a>
      <div id="auth-nav"></div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container">
    <!-- 头部 -->
    <div class="page-header">
      <h1 class="page-title">📝 笔记和书签</h1>
      <p class="page-subtitle">管理你的学习笔记和课程书签</p>
    </div>

    <!-- 选项卡 -->
    <div class="tabs" role="tablist">
      <button class="tab active" role="tab" aria-selected="true"  aria-controls="notes-tab"     id="tab-notes">📝 笔记</button>
      <button class="tab"        role="tab" aria-selected="false" aria-controls="bookmarks-tab" id="tab-bookmarks">🔖 书签</button>
    </div>

    <!-- 笔记标签页 -->
    <div id="notes-tab" class="tab-content">
      <div class="course-selector">
        <label for="notes-course-select">筛选课程：</label>
        <select id="notes-course-select">
          <option value="">所有课程</option>
        </select>
      </div>

      <div id="notes-container">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 书签标签页：用 style="display:none" 而非 hidden 属性，避免与 JS style.display 冲突 -->
    <div id="bookmarks-tab" class="tab-content" style="display:none" role="tabpanel" aria-labelledby="tab-bookmarks">
      <div class="course-selector">
        <label for="bookmarks-course-select">筛选课程：</label>
        <select id="bookmarks-course-select">
          <option value="">所有课程</option>
        </select>
      </div>

      <div id="bookmarks-container">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="/assets/js/auth-email.js" defer></script>
<script src="/assets/js/auth.js" defer></script>
  <script src="/assets/js/api-client.js" defer></script>
  <script src="/assets/js/navbar.js" defer></script>

  <script>
    // 课程映射
    const COURSES = {
      '01-lunyu': '《论语》选读',
      '01-lunyu-mixed': '《论语》混合版',
      '02-sanzijing': '《三字经》',
      '02-xueer': '《学而篇》',
      '03-xueer-xiaoti': '《学而篇·小题大做》',
      '04-zengzi-sansheng': '《曾子三省》',
      '05-dao-qiancheng-guo': '《道千乘之国》',
      '06-dizi-ruze-xiao': '《弟子如彻小》',
      '07-xianxian-yise': '《贤贤易色》',
      '08-junzi-bu-zhong': '《君子不重则不威》'
    }

    let allNotes = []
    let allBookmarks = []

    /**
     * 轻量 toast 通知（替代 alert，非阻塞）
     * @param {string} msg - 消息文本
     * @param {'success'|'error'} type
     */
    function showToast(msg, type) {
      const toast = document.createElement('div')
      toast.setAttribute('role', 'status')
      toast.setAttribute('aria-live', 'polite')
      const isError = type === 'error'
      toast.style.cssText = [
        'position:fixed', 'bottom:var(--ds-space-6)', 'left:50%',
        'transform:translateX(-50%)',
        'background:' + (isError ? 'var(--ds-color-error-bg)' : 'var(--ds-color-success-bg)'),
        'color:' + (isError ? 'var(--ds-color-error)' : 'var(--ds-color-success)'),
        'border:1px solid ' + (isError ? 'var(--ds-color-error)' : 'var(--ds-color-success)'),
        'border-radius:var(--ds-radius-lg)',
        'padding:var(--ds-space-3) var(--ds-space-5)',
        'font-size:0.875rem', 'font-weight:500',
        'box-shadow:var(--ds-shadow-md)',
        'z-index:9999', 'white-space:nowrap',
        'animation:fadeIn var(--ds-duration-200) var(--ds-ease-out)',
      ].join(';')
      toast.textContent = msg
      document.body.appendChild(toast)
      setTimeout(() => {
        toast.style.transition = 'opacity var(--ds-duration-300)'
        toast.style.opacity = '0'
        setTimeout(() => toast.remove(), 300)
      }, 2500)
    }
     * @param {string} tabName - 'notes' 或 'bookmarks'
     * @param {HTMLElement} btn - 被点击的 tab 按钮（由 onclick 传入 this）
     */
    function switchTab(tabName, btn) {
      // 隐藏所有面板
      document.querySelectorAll('.tab-content').forEach(panel => {
        panel.style.display = 'none'
      })
      // 取消所有选中状态
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active')
        tab.setAttribute('aria-selected', 'false')
      })
      // 显示目标面板
      const panel = document.getElementById(tabName + '-tab')
      if (panel) panel.style.display = 'block'
      // 标记当前 tab
      if (btn) {
        btn.classList.add('active')
        btn.setAttribute('aria-selected', 'true')
      }
      // 按需加载数据
      if (tabName === 'notes') loadNotes()
      else loadBookmarks()
    }

    /**
     * 加载笔记
     */
    async function loadNotes() {
      try {
        const container = document.getElementById('notes-container')
        container.innerHTML = '<div class="loading">加载中...</div>'

        if (!window.SUPABASE) {
          throw new Error('Supabase 未加载')
        }

        allNotes = []
        const courseIds = Object.keys(COURSES)

        for (const courseId of courseIds) {
          const notes = await window.SUPABASE.getNotes(courseId)
          if (notes && notes.length > 0) {
            allNotes.push(...notes.map(n => ({ ...n, course_id: courseId })))
          }
        }

        // 按创建时间排序（最新在前）
        allNotes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))

        // 更新课程选择器
        const courseSelect = document.getElementById('notes-course-select')
        const uniqueCourses = [...new Set(allNotes.map(n => n.course_id))]
        courseSelect.innerHTML = '<option value="">所有课程</option>' +
          uniqueCourses.map(cid => `<option value="${cid}">${COURSES[cid] || cid}</option>`).join('')

        // 渲染笔记
        renderNotes()
      } catch (err) {
        console.error('加载笔记失败:', err)
        document.getElementById('notes-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-text">加载失败</div>
            <div class="empty-hint">${err.message}</div>
          </div>
        `
      }
    }

    /**
     * 渲染笔记
     */
    function renderNotes() {
      const container = document.getElementById('notes-container')
      const selectedCourse = document.getElementById('notes-course-select').value

      let filteredNotes = allNotes
      if (selectedCourse) {
        filteredNotes = allNotes.filter(n => n.course_id === selectedCourse)
      }

      if (filteredNotes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-text">还没有笔记</div>
            <div class="empty-hint">在学习过程中创建笔记，它们会显示在这里</div>
          </div>
        `
        return
      }

      container.innerHTML = `
        <div class="notes-grid">
          ${filteredNotes.map(note => `
            <div class="note-card ${note.color_tag || 'yellow'}">
              <div class="note-header">
                <div>
                  <div class="note-title">${escapeHtml(note.title || '无标题')}</div>
                  <div class="note-meta">
                    ${COURSES[note.course_id] || note.course_id} • 第 ${note.page} 页
                  </div>
                </div>
                <div class="note-actions">
                  <button class="note-action-btn" data-note-id="${note.id}" aria-label="删除笔记">🗑️</button>
                </div>
              </div>
              <div class="note-body">${escapeHtml(note.content || '')}</div>
            </div>
          `).join('')}
        </div>
      `
    }

    /**
     * 过滤笔记
     */
    function filterNotes() {
      renderNotes()
    }

    /**
     * 删除笔记
     */
    async function deleteNote(noteId) {
      if (!confirm('确定要删除这条笔记吗？')) return

      try {
        const success = await window.SUPABASE.deleteNote(noteId)
        if (success) {
          allNotes = allNotes.filter(n => n.id !== noteId)
          renderNotes()
          showToast('笔记已删除', 'success')
        } else {
          throw new Error('删除失败')
        }
      } catch (err) {
        console.error('删除笔记失败:', err)
        showToast('删除失败：' + err.message, 'error')
      }
    }

    /**
     * 加载书签
     */
    async function loadBookmarks() {
      try {
        const container = document.getElementById('bookmarks-container')
        container.innerHTML = '<div class="loading">加载中...</div>'

        if (!window.SUPABASE) {
          throw new Error('Supabase 未加载')
        }

        allBookmarks = []
        const courseIds = Object.keys(COURSES)

        for (const courseId of courseIds) {
          const bookmarks = await window.SUPABASE.getBookmarks(courseId)
          if (bookmarks && bookmarks.length > 0) {
            allBookmarks.push(...bookmarks.map(b => ({ ...b, course_id: courseId })))
          }
        }

        // 按页码排序
        allBookmarks.sort((a, b) => {
          if (a.course_id !== b.course_id) {
            return a.course_id.localeCompare(b.course_id)
          }
          return a.page - b.page
        })

        // 更新课程选择器
        const courseSelect = document.getElementById('bookmarks-course-select')
        const uniqueCourses = [...new Set(allBookmarks.map(b => b.course_id))]
        courseSelect.innerHTML = '<option value="">所有课程</option>' +
          uniqueCourses.map(cid => `<option value="${cid}">${COURSES[cid] || cid}</option>`).join('')

        // 渲染书签
        renderBookmarks()
      } catch (err) {
        console.error('加载书签失败:', err)
        document.getElementById('bookmarks-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-text">加载失败</div>
            <div class="empty-hint">${err.message}</div>
          </div>
        `
      }
    }

    /**
     * 渲染书签
     */
    function renderBookmarks() {
      const container = document.getElementById('bookmarks-container')
      const selectedCourse = document.getElementById('bookmarks-course-select').value

      let filteredBookmarks = allBookmarks
      if (selectedCourse) {
        filteredBookmarks = allBookmarks.filter(b => b.course_id === selectedCourse)
      }

      if (filteredBookmarks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔖</div>
            <div class="empty-text">还没有书签</div>
            <div class="empty-hint">在课程中添加书签，重要的页面会被保存</div>
          </div>
        `
        return
      }

      container.innerHTML = `
        <div class="bookmarks-list">
          ${filteredBookmarks.map(bookmark => `
            <div class="bookmark-item">
              <div class="bookmark-info">
                <div class="bookmark-course">${COURSES[bookmark.course_id] || bookmark.course_id}</div>
                <div class="bookmark-page">
                  第 ${bookmark.page} 页
                  ${bookmark.note ? ` • ${escapeHtml(bookmark.note)}` : ''}
                </div>
              </div>
              <div class="bookmark-actions">
                <div class="bookmark-icon">🔖</div>
                <button class="delete-btn" data-course="${bookmark.course_id}" data-page="${bookmark.page}" aria-label="删除书签">✕</button>
              </div>
            </div>
          `).join('')}
        </div>
      `
    }

    /**
     * 过滤书签
     */
    function filterBookmarks() {
      renderBookmarks()
    }

    /**
     * 删除书签
     */
    async function removeBookmark(courseId, page) {
      if (!confirm('确定要删除这个书签吗？')) return

      try {
        const success = await window.SUPABASE.removeBookmark(courseId, page)
        if (success) {
          allBookmarks = allBookmarks.filter(b => !(b.course_id === courseId && b.page === page))
          renderBookmarks()
          showToast('书签已删除', 'success')
        } else {
          throw new Error('删除失败')
        }
      } catch (err) {
        console.error('删除书签失败:', err)
        showToast('删除失败：' + err.message, 'error')
      }
    }

    /**
     * 转义 HTML
     */
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }
      return text.replace(/[&<>"']/g, m => map[m])
    }

    /**
     * 等待 AUTH / SUPABASE 就绪（轮询替代固定 timeout）
     */
    async function waitForDeps(maxMs = 3000) {
      const step = 50
      let elapsed = 0
      while (elapsed < maxMs) {
        if (typeof AUTH !== 'undefined' && window.SUPABASE) return true
        await new Promise(r => setTimeout(r, step))
        elapsed += step
      }
      return false
    }

    /**
     * 初始化
     */
    async function init() {
      const ready = await waitForDeps(3000)
      if (!ready) {
        document.querySelector('.container').insertAdjacentHTML(
          'afterbegin',
          '<div role="alert" style="background:var(--ds-color-error-bg);color:var(--ds-color-error);border-radius:var(--ds-radius-lg);padding:var(--ds-space-4);margin-bottom:var(--ds-space-5);">⚠️ 页面初始化超时，请刷新重试。</div>'
        )
        return
      }

      if (!AUTH.isLoggedIn()) {
        window.location.href = '/'
        return
      }

      // 加载第一个面板
      loadNotes()
    }

    document.addEventListener('DOMContentLoaded', function () {
      // P3: tab 按钮用 addEventListener 替代 onclick 属性
      const tabNotes     = document.getElementById('tab-notes');
      const tabBookmarks = document.getElementById('tab-bookmarks');
      if (tabNotes)     tabNotes.addEventListener('click', function () { switchTab('notes', this); });
      if (tabBookmarks) tabBookmarks.addEventListener('click', function () { switchTab('bookmarks', this); });

      // P3: select 用 addEventListener 替代 onchange 属性
      const notesSelect     = document.getElementById('notes-course-select');
      const bookmarksSelect = document.getElementById('bookmarks-course-select');
      if (notesSelect)     notesSelect.addEventListener('change', filterNotes);
      if (bookmarksSelect) bookmarksSelect.addEventListener('change', filterBookmarks);

      // P3: 事件委托 — 处理动态生成的笔记删除按钮（data-note-id）
      const notesContainer = document.getElementById('notes-container');
      if (notesContainer) {
        notesContainer.addEventListener('click', function (e) {
          const btn = e.target.closest('[data-note-id]');
          if (btn) {
            const noteId = btn.getAttribute('data-note-id');
            if (noteId) deleteNote(noteId);
          }
        });
      }

      // P3: 事件委托 — 处理动态生成的书签删除按钮（data-course + data-page）
      const bookmarksContainer = document.getElementById('bookmarks-container');
      if (bookmarksContainer) {
        bookmarksContainer.addEventListener('click', function (e) {
          const btn = e.target.closest('[data-course][data-page]');
          if (btn) {
            const courseId = btn.getAttribute('data-course');
            const page     = parseInt(btn.getAttribute('data-page'), 10);
            if (courseId && !isNaN(page)) removeBookmark(courseId, page);
          }
        });
      }

      // 启动初始化
      init();
    });
  </script>
</body>
</html>
