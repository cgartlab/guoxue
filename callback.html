<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录中 — 国学课堂</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/ds-design-system.css">
  <style>
    .callback-container {
      max-width: 480px;
      margin: 120px auto;
      text-align: center;
      padding: 40px;
    }
    .callback-status {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-size: 0.9375rem;
    }
    .callback-status.loading {
      background: var(--ds-color-olive-50, #f5f7f0);
      color: var(--ds-color-muted, #666);
    }
    .callback-status.success {
      background: var(--ds-color-success-bg, #f0fae8);
      color: var(--ds-color-success, #52c41a);
    }
    .callback-status.error {
      background: var(--ds-color-error-bg, #fef2f2);
      color: var(--ds-color-error, #ef4444);
    }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--ds-color-border, #e5e5e5);
      border-top-color: var(--ds-accent, #1677ff);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-error { display: none; }
  </style>
</head>
<body>
  <div class="callback-container">
    <h1 class="ds-section-title">国学课堂</h1>
    <div class="spinner" id="loading-spinner"></div>
    <div id="status-message" class="callback-status loading">正在处理登录...</div>
    <div id="auth-error" class="auth-error callback-status error"></div>
    <p class="placeholder-center-sm"><a href="index.html" class="ds-accent-link">← 返回首页</a></p>
  </div>

  <script src="assets/js/auth.js" defer></script>

  <!-- Supabase 数据持久化 -->
  <script src="assets/js/api-client.js" defer></script>
  <script>
  document.addEventListener("DOMContentLoaded", async function() {
    const statusEl = document.getElementById("status-message");
    const spinner = document.getElementById("loading-spinner");
    const errorEl = document.getElementById("auth-error");
    const urlParams = new URLSearchParams(window.location.search);

    // 检查是否是 WeChat OAuth 直接返回的 token
    const directToken = urlParams.get("token");
    const redirectParam = urlParams.get("redirect");
    const errorParam = urlParams.get("error");

    if (errorParam) {
      spinner.style.display = "none";
      statusEl.className = "callback-status error";
      statusEl.textContent = "❌ 登录失败: " + (errorParam === 'wechat_token_failed' ? '微信授权失败' : errorParam);
      return;
    }

    if (directToken) {
      // WeChat OAuth 直接返回 token - 直接存储并完成登录
      localStorage.setItem("casdoor_access_token", directToken);
      localStorage.setItem("casdoor_id_token", directToken);
      localStorage.setItem("casdoor_expires_at", String(Date.now() + 7 * 24 * 60 * 60 * 1000));

      // 解析 JWT payload 获取用户信息
      try {
        const payload = JSON.parse(atob(directToken.split('.')[1]));
        localStorage.setItem("casdoor_user_name", payload.name || "");
        localStorage.setItem("casdoor_user_avatar", payload.avatar || "");
      } catch (e) {
        console.warn("[Callback] Failed to parse token payload:", e);
      }

      // 同步到 Supabase（非阻塞）
      if (typeof window !== 'undefined' && window.SUPABASE && window.SUPABASE.syncUser) {
        setTimeout(function() {
          window.SUPABASE.syncUser().then(function() {
            console.log('[Callback] User synced to Supabase');
          }).catch(function(err) {
            console.warn('[Callback] Supabase sync failed (non-fatal):', err);
          });
        }, 100);
      }

      spinner.style.display = "none";
      statusEl.className = "callback-status success";
      statusEl.textContent = "✅ 微信登录成功！即将跳转...";

      // 跳转回来源页
      const redirectBack = redirectParam || localStorage.getItem("casdoor_redirect_back") || "index.html";
      localStorage.removeItem("casdoor_redirect_back");
      setTimeout(function() {
        window.location.href = redirectBack;
      }, 1500);
      return;
    }

    // 标准 Casdoor OAuth 流程
    const result = await AUTH.handleCallback();

    if (result && result.success) {
      spinner.style.display = "none";
      statusEl.className = "callback-status success";
      statusEl.textContent = "✅ 登录成功！即将跳转...";

      // 获取用户信息
      const userInfo = await AUTH.getUserInfo();
      if (userInfo) {
        localStorage.setItem("casdoor_user_name", userInfo.name || userInfo.displayName || "");
        localStorage.setItem("casdoor_user_avatar", userInfo.avatar || "");
      }

      // 跳转回来源页
      const redirectBack = localStorage.getItem("casdoor_redirect_back");
      localStorage.removeItem("casdoor_redirect_back");
      setTimeout(function() {
        window.location.href = redirectBack || "index.html";
      }, 1500);
    } else {
      spinner.style.display = "none";
      statusEl.className = "callback-status error";
      statusEl.textContent = "❌ 登录处理失败";
    }
  });
  </script>
</body>
</html>
