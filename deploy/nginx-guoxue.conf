# 国学课堂 Nginx 配置 (适用于 宝塔面板 / BT Panel)
# 服务器路径: /www/server/panel/vhost/nginx/guoxue.8023laozhanshi.cc.conf
#
# 重要: Casdoor API 路由必须包含以下端点:
#   send-verification-code  - 发送邮箱验证码
#   verify-captcha          - 验证图形验证码
# 这些端点需要代理到 Casdoor (端口 8000)，而非 Guoxue API (端口 3000)

server {
    listen 443 ssl;
    server_name guoxue.8023laozhanshi.cc;

    root /opt/guoxue;
    index index.html;

    # Casdoor 内部 API（get-xxx, signin, login, signup, send-verification-code, verify-code 等）
    # 优先于通用 /api/，避免被误指向 Guoxue API
    location ~ ^/api/(get-|signin|login|signup|send-verification-code|verify-code|verify-captcha|verify-identification) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Guoxue 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
