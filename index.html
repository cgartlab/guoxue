  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body class="scroll-mode">

  <a class="skip-link" href="#main-content">跳过导航</a>

  <div class="bg-layer" aria-hidden="true"></div>
  <div class="ink-dot ink-dot-1" aria-hidden="true"></div>
  <div class="ink-dot ink-dot-2" aria-hidden="true"></div>
  <div class="ink-dot ink-dot-3" aria-hidden="true"></div>

  <nav class="ds-navbar" aria-label="主导航">
    <a class="ds-btn-nav" href="index.html">📜 国学课堂</a>
    <div class="ds-nav-center"></div>
    <div class="ds-nav-right">
      <a class="ds-btn-nav" href="about.html">关于本站</a>
    </div>
  </nav>

  <main id="main-content" class="page-wrapper">
    <div class="ds-container">

      <section class="ds-hero">
        <h1>国学课堂</h1>
        <p class="hero-subtitle">传承经典 · 启迪智慧</p>
        <div class="hero-ornament" aria-hidden="true"></div>
        <p class="hero-desc">
          欢迎来到国学课堂！在这里，我们一起走近中华传统文化的瑰宝，
          在经典中汲取智慧，在诵读中涵养品格。每一门课程都精心设计，
          适合小学生循序渐进地学习。
        </p>
      </section>

      <section style="margin-bottom: var(--ds-space-12);">
        <h2 class="ds-section-title">📚 课程目录</h2>
        <div id="lesson-cards" class="ds-card-grid"></div>
      </section>

    </div>
  </main>

  <footer class="ds-footer">
    © 2026 国学课堂 · Powered by GitHub Pages
  </footer>

  <script src="assets/js/lessons-manifest.js" defer></script>
  <script>
    (function () {
      var lessons = window.GUOXUE_LESSONS || [];
      var container = document.getElementById('lesson-cards');

      lessons.forEach(function (lesson) {
        var isComing = lesson.status === 'coming';

        var card = document.createElement('a');
        card.className = 'ds-lesson-card';
        card.href = lesson.path;
        if (isComing) {
          card.style.pointerEvents = 'none';
          card.style.opacity = '0.5';
        }

        var iconDiv = document.createElement('div');
        iconDiv.className = 'lesson-icon';
        iconDiv.textContent = lesson.icon || '📚';

        var gradeBadge = document.createElement('span');
        gradeBadge.className = 'lesson-grade';
        gradeBadge.textContent = lesson.grade || '';

        var title = document.createElement('h3');
        title.className = 'lesson-title';
        title.textContent = lesson.title || '';

        var subtitle = document.createElement('p');
        subtitle.className = 'lesson-subtitle';
        var meta = [lesson.subtitle || ''];
        if (lesson.duration) meta.push(lesson.duration);
        subtitle.textContent = meta.filter(Boolean).join(' · ');

        var desc = document.createElement('p');
        desc.className = 'lesson-desc';
        desc.textContent = lesson.description || '';

        var cta = document.createElement('div');
        cta.className = 'lesson-cta';
        var ctaText = document.createElement('span');
        ctaText.textContent = isComing ? '即将上线' : '开始学习';
        var arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = isComing ? '' : ' →';
        cta.appendChild(ctaText);
        cta.appendChild(arrow);

        if (isComing) {
          var overlay = document.createElement('div');
          overlay.textContent = '即将上线';
          overlay.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;color:var(--ds-color-muted);background:oklch(100% 0 0 / 0.7);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);border-radius:var(--ds-radius-2xl);z-index:2;pointer-events:none;letter-spacing:0.1em;';
          card.style.position = 'relative';
          card.appendChild(overlay);
        }

        card.appendChild(iconDiv);
        card.appendChild(gradeBadge);
        card.appendChild(title);
        card.appendChild(subtitle);
        card.appendChild(desc);
        card.appendChild(cta);

        container.appendChild(card);
      });
    })();
  </script>

</body>
</html>
