services:
  # ─── PostgreSQL（独立数据库，与 Casdoor 的数据库分开） ───
  guoxue-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guoxue
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: guoxue
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - guoxue-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guoxue"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API 服务 ───
  guoxue-api:
    build: .
    ports:
      - "127.0.0.1:3000:3000"   # 仅监听 localhost，通过 Nginx 反代出去
    env_file: .env
    environment:
      DB_HOST: guoxue-db
      DB_PORT: 5432
      DB_NAME: guoxue
      DB_USER: guoxue
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      guoxue-db:
        condition: service_healthy
    networks:
      - guoxue-net
    restart: unless-stopped

networks:
  guoxue-net:
    driver: bridge

volumes:
  pgdata:
