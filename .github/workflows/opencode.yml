name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ARGUS_APP_ID }}
          private-key: ${{ secrets.ARGUS_PRIVATE_KEY }}

      - name: Configure git with app token
        run: |
          git config user.name "argus-cgartlab[bot]"
          git config user.email "291769438+argus-cgartlab[bot]@users.noreply.github.com"
          echo "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com" > $HOME/.git-credentials
          git config credential.helper store

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
